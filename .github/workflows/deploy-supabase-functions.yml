# Deploys Supabase Edge Functions on every merge to main — OPTIONAL.
#
# On Lovable Cloud the Supabase project is Lovable-managed and no personal
# access token exists, so this workflow SKIPS gracefully (green, no-op).
# The engine is still served from /api/opportunity-engine on the site's own
# origin (Netlify/Vercel serverless venue, deployed with the frontend).
#
# If the project is ever migrated to a self-owned Supabase account:
#   1. Create a token at https://supabase.com/dashboard/account/tokens
#   2. Add it as a repository secret named SUPABASE_ACCESS_TOKEN
#   3. Merges then deploy the full-universe edge venue automatically.

name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: reprphurmjtveejeqejn
    steps:
      - uses: actions/checkout@v4

      - name: Check for SUPABASE_ACCESS_TOKEN secret
        id: token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::notice::SUPABASE_ACCESS_TOKEN not set (expected on Lovable Cloud) — skipping edge-function deploy. The /api/opportunity-engine serverless venue serves the engine instead."
            echo "have_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "have_token=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v1
        if: steps.token.outputs.have_token == 'true'
        with:
          version: latest

      # Deploys every function under supabase/functions, honoring
      # config.toml verify_jwt settings. The repo is the source of truth.
      - name: Deploy all edge functions
        if: steps.token.outputs.have_token == 'true'
        run: supabase functions deploy --project-ref "$PROJECT_REF"
